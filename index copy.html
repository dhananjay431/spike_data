<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIFTY 50 - Live Market Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js">
    </script>
    <style>
        :root {
            --bg: #0d1117;
            --card-bg: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-secondary: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --accent: #58a6ff;
            --gold: #d2991d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            padding: 16px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px 20px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .header-left h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header-left .timestamp {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .market-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
        }

        .market-status.closed {
            background: rgba(248, 81, 73, 0.12);
            color: var(--red);
        }

        .market-status.open {
            background: rgba(63, 185, 80, 0.12);
            color: var(--green);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-dot.closed {
            background: var(--red);
        }

        .status-dot.open {
            background: var(--green);
        }

        /* Index Summary */
        .index-summary {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .summary-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
        }

        .summary-card .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .summary-card .value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .summary-card .sub {
            font-size: 0.8rem;
            margin-top: 2px;
        }

        .value.positive {
            color: var(--green);
        }

        .value.negative {
            color: var(--red);
        }

        /* Charts Row */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
        }

        .chart-card h3 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .chart-wrap {
            position: relative;
            width: 100%;
            height: 320px;
        }

        .chart-wrap canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* Stock Table */
        .table-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .table-card h3 {
            padding: 14px 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .table-wrap {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.82rem;
        }

        thead {
            position: sticky;
            top: 0;
            z-index: 2;
        }

        th {
            background: #1c2129;
            padding: 10px 14px;
            text-align: right;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        th:first-child {
            text-align: left;
        }

        th:nth-child(2) {
            text-align: left;
        }

        td {
            padding: 9px 14px;
            text-align: right;
            border-bottom: 1px solid rgba(48, 54, 61, 0.5);
            white-space: nowrap;
        }

        td:first-child {
            text-align: left;
            font-weight: 600;
        }

        td:nth-child(2) {
            text-align: left;
            color: var(--text-secondary);
            font-size: 0.76rem;
        }

        tbody tr:hover {
            background: rgba(88, 166, 255, 0.04);
        }

        .pos {
            color: var(--green);
        }

        .neg {
            color: var(--red);
        }

        /* Footer */
        .footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.72rem;
            padding: 8px;
        }

        /* Refresh Button */
        .refresh-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover {
            opacity: 0.85;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .adv-decl {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .adv-decl span.adv {
            color: var(--green);
        }

        .adv-decl span.dec {
            color: var(--red);
        }

        @media (max-width: 768px) {
            .charts-row {
                grid-template-columns: 1fr;
            }

            .index-summary {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

        let barChart = null;

        // ===== FORMAT HELPERS =====
        function fmtNum(n, decimals = 2) {
            if (n == null || isNaN(n)) return '--';
            return Number(n).toLocaleString('en-IN', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
        }

        function fmtCr(n) {
            if (n == null || isNaN(n)) return '--';
            return (n / 1e7).toFixed(0);
        }

        function fmtVol(n) {
            if (n == null || isNaN(n)) return '--';
            if (n >= 1e7) return (n / 1e7).toFixed(2) + ' Cr';
            if (n >= 1e5) return (n / 1e5).toFixed(2) + ' L';
            return n.toLocaleString('en-IN');
        }

        function clsChange(val) {
            if (val > 0) return 'pos';
            if (val < 0) return 'neg';
            return '';
        }

        // ===== PROCESS DATA =====
        function processData(raw) {
            const stocks = raw.data.filter(d => d.priority === 0 && d.symbol !== 'NIFTY 50');
            const indexInfo = raw.data.find(d => d.priority === 1) || raw.metadata;
            const meta = raw.metadata;
            const market = raw.marketStatus;
            return { stocks, indexInfo, meta, market, advance: raw.advance, timestamp: raw.timestamp };
        }

        // ===== RENDER =====
        function renderAll(data) {
            const { stocks, indexInfo, meta, market, advance, timestamp } = processData(data);

            // Timestamp
            document.getElementById('timestamp').textContent = 'Last Updated: ' + (timestamp || meta.timeVal || '--');

            // Market Status
            const isClosed = market.marketStatus.toLowerCase().includes('closed');
            const msEl = document.getElementById('marketStatus');
            const msDot = msEl.querySelector('.status-dot');
            const msText = document.getElementById('marketStatusText');
            msEl.className = 'market-status ' + (isClosed ? 'closed' : 'open');
            msDot.className = 'status-dot ' + (isClosed ? 'closed' : 'open');
            msText.textContent = market.marketStatusMessage || market.marketStatus;

            // Advances / Declines
            if (advance) {
                document.getElementById('advDecl').innerHTML =
                    `<span class="adv">▲ ${advance.advances} Advances</span>` +
                    `<span class="dec">▼ ${advance.declines} Declines</span>` +
                    (advance.unchanged > 0 ? `<span>— ${advance.unchanged} Unchanged</span>` : '');
            }

            // Index Summary Cards
            const idx = indexInfo;
            const idxChange = idx.change || meta.change || 0;
            const idxPChange = idx.pChange != null ? idx.pChange : meta.percChange;
            document.getElementById('indexSummary').innerHTML = `
                <div class="summary-card">
                    <div class="label">NIFTY 50</div>
                    <div class="value ${idxChange >= 0 ? 'positive' : 'negative'}">${fmtNum(idx.lastPrice || meta.last)}</div>
                    <div class="sub ${idxChange >= 0 ? 'positive' : 'negative'}">
                        ${idxChange >= 0 ? '+' : ''}${fmtNum(idxChange)} (${idxPChange >= 0 ? '+' : ''}${fmtNum(idxPChange)}%)
                    </div>
                </div>
                <div class="summary-card">
                    <div class="label">Open</div>
                    <div class="value">${fmtNum(idx.open || meta.open)}</div>

                    <div class="value positive">${fmtNum(idx.dayHigh || meta.high)}</div>

                        <span class="negative">${fmtNum(idx.yearLow || meta.yearLow)}</span>
                    </div>
                </div>
            `;

            // Sort stocks by abs pChange for bar chart (top 10)
            const top10 = [...stocks].sort((a, b) => Math.abs(b.pChange) - Math.abs(a.pChange)).slice(0, 10);

        function renderBarChart(top10) {

                            grid: { color: 'rgba(48,54,61,0.4)' },
                            ticks: { color: '#8b949e', callback: v => v + '%' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#c9d1d9', font: { weight: 'bold' } }
                        }
                    }
                }
            });
        }

        function renderPieChart(top10) {
            const ctx = document.getElementById('pieChart').getContext('2d');
            if (pieChart) pieChart.destroy();

            const labels = top10.map(s => s.symbol);
            const values = top10.map(s => s.ffmc || 0);
            const colors = [
                '#58a6ff', '#3fb950', '#d2991d', '#f85149', '#bc8cff',
                '#f778ba', '#79c0ff', '#56d364', '#e3b341', '#db6d28'
            ];

            pieChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors,
                        borderColor: '#161b22',
                        borderWidth: 3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#c9d1d9',
                                padding: 10,
                                font: { size: 11 },
                                usePointStyle: true,
                                pointStyleWidth: 8,
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const val = ctx.raw;
                                    return ` ₹${(val / 1e5).toFixed(2)} Lakh Cr`;
                                }
                            }
                        }
                    }
                }
            });
        }

        function renderTable(stocks) {
            const sorted = [...stocks].sort((a, b) => Math.abs(b.pChange) - Math.abs(a.pChange));
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = sorted.map(s => {
                const chgCls = clsChange(s.change);
                const company = s.meta ? s.meta.companyName : (s.symbol || '');
                return `
                <tr>
                    <td>${s.symbol}</td>
                    <td>${company}</td>
                    <td>${fmtNum(s.lastPrice)}</td>
                    <td class="${chgCls}">${s.change >= 0 ? '+' : ''}${fmtNum(s.change)}</td>
                    <td class="${chgCls}">${s.pChange >= 0 ? '+' : ''}${fmtNum(s.pChange)}%</td>
                    <td>${fmtNum(s.open)}</td>
                    <td>${fmtNum(s.dayHigh)}</td>
                    <td>${fmtNum(s.dayLow)}</td>
                    <td>${fmtVol(s.totalTradedVolume)}</td>
                    <td>${fmtCr(s.totalTradedValue)}</td>
                </tr>`;
            }).join('');
        }

        // ===== FETCH LIVE DATA =====
        async function loadData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Loading...';

            try {
                // Try via allorigins CORS proxy
                const proxyUrl = 'https://api.allorigins.win/raw?url=';
                const apiUrl = 'https://www.nseindia.com/api/equity-stockIndices?index=NIFTY%2050';

                const resp = await fetch(proxyUrl + encodeURIComponent(apiUrl), {
                    headers: { 'Accept': 'application/json' }
                });

                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const json = await resp.json();
                if (json && json.data && json.data.length > 1) {
                    renderAll(json);
                    btn.textContent = '✅ Refreshed';
                    setTimeout(() => { btn.textContent = '🔄 Refresh Data'; }, 2000);
                } else {
                    throw new Error('Invalid response structure');
                }
            } catch (e) {
                console.warn('Live fetch failed, using embedded data:', e.message);
                // Fallback to embedded data
                renderAll(EMBEDDED_DATA);
                btn.textContent = '⚠️ Using Cached Data';
                setTimeout(() => { btn.textContent = '🔄 Refresh Data'; }, 2500);
            } finally {
                btn.disabled = false;
            }
        }

        // ===== INIT =====
        // Load embedded data immediately
        renderAll(EMBEDDED_DATA);
        // Then attempt live fetch
        loadData();
        // Auto-refresh every 5 minutes
        setInterval(loadData, 300000);
    </script>
</body>

</html>
